<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Space Shooter</title>
</head>
<body class="select-none">
    <div id="game-container" class="game-layout">
        <div class="glass-panel">
            
            <!-- HUD Overlay -->
            <div class="hud">
                <div class="stat-box">
                    <div class="stat-label">Wave</div>
                    <div id="waveSpan" class="stat-value">1</div>
                </div>
                
                <div class="game-controls">
                    <button id="pauseBtn" class="btn-control">PAUSE</button>
                    <button id="manualRebootBtn" class="btn-control">REBOOT</button>
                </div>

                <div class="stat-box right">
                    <div class="stat-label">Score</div>
                    <div id="scoreSpan" class="stat-value">000000</div>
                </div>
            </div>

            <!-- Pause Overlay -->
            <div id="pauseOverlay" class="overlay hidden bg-black/60">
                <h1 class="text-glow">PAUSED</h1>
                <p>Press ESC or click PLAY to resume</p>
            </div>

            <!-- Game Over Overlay -->
            <div id="restartBtn" class="overlay hidden">
                <h1>MISSION FAILED</h1>
                <p>System override initiated</p>
                <button class="btn-restart">
                    Reboot System
                </button>
            </div>

            <!-- CRT Effect Overlay -->
            <div class="crt-overlay"></div>

            <canvas 
                id="gameCanvas" 
                width="600" 
                height="800" 
            ></canvas>
        </div>

        <!-- Controls Footer -->
        <div class="controls-footer">
            <div class="control-item">
                <kbd>Left / A</kbd>
                <kbd>Right / D</kbd>
                <span>Navigation</span>
            </div>
            <div class="control-item">
                <kbd>SPACE</kbd>
                <span>Fire Cannons</span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
