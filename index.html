<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Add the CSS the AI gave you here. Example: */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .crt-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 25;
        }
        /* ... add the rest of your custom classes ... */
    </style>
</head>
<body class="bg-[#0a0a0a] text-white"> <div id="game-container" class="flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden select-none">
        <div class="relative glass-panel rounded-sm overflow-hidden border border-gray-800">
            
            <div class="absolute top-0 left-0 w-full p-5 flex justify-between items-start z-20 pointer-events-none">
                <div class="stat-box">
                    <div class="stat-label text-xs text-gray-500 uppercase tracking-widest">Wave</div>
                    <div id="waveSpan" class="stat-value text-2xl font-bold text-[#ff33ff]">1</div>
                </div>
                <div class="stat-box text-right">
                    <div class="stat-label text-xs text-gray-500 uppercase tracking-widest">Score</div>
                    <div id="scoreSpan" class="stat-value text-2xl font-mono">000000</div>
                </div>
            </div>

            <div id="restartBtn" class="hidden absolute inset-0 z-30 bg-black/85 flex flex-col items-center justify-center text-center p-8">
                <h1 class="text-7xl font-black text-[#f00] m-0 mb-2 tracking-tighter">MISSION FAILED</h1>
                <p class="text-xl text-[#888] font-mono mb-8 uppercase tracking-widest">System override initiated</p>
                <button class="px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-bold uppercase tracking-widest transition-colors">
                    Reboot System
                </button>
            </div>

            <div class="crt-overlay"></div>

            <canvas 
                id="gameCanvas" 
                width="600" 
                height="800" 
                class="max-w-full h-auto bg-black cursor-none block"
            ></canvas>
        </div>

        <div class="mt-8 flex gap-12 text-[10px] text-[#666] uppercase tracking-[0.2em] font-bold">
            <div class="flex items-center gap-3">
                <span class="px-2 py-1 border border-[#333] text-gray-400">Left / A</span>
                <span class="px-2 py-1 border border-[#333] text-gray-400">Right / D</span>
                <span>Navigation</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="px-4 py-1 border border-[#333] text-gray-400">SPACE</span>
                <span>Fire Cannons</span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
